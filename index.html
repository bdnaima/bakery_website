<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <title>Munami Cakery</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <a href="index.html">
        <h1>Munami Cakery</h1>
      </a>

      <div class="nav-links">
        <a href="/index.html" class="active">Home</a>
        <a href="/about.html">About</a>
        <a href="/products.html">Products</a>
        <a href="/contact.html">Contact</a>
      </div>
    </nav>

    <!-- Hero section -->
    <div class="hero">
      <div class="hero-heading">
        <h2>Everyday is a delicous adventure</h2>
        <button id="more-about-us">More About Us</button>
      </div>
      <div class="hero-image">
        <img src="images/cupcake_img.webp" alt="Cupcake" />
      </div>
    </div>

    <!-- Main -->
    <main class="content">
      <section>
        <h2>Popular treats</h2>
        <div class="cards">
          <div class="card">
            <img src="images/choco_img.jpg" />
            <p>Choco</p>
            <p>$3.50</p>
          </div>
          <div class="card">
            <img src="images/redVelvet_img.jpg" />
            <p>Choco</p>
            <p>$3.50</p>
          </div>
          <div class="card">
            <img src="images/vanillaDream_img.png" />
            <p>Choco</p>
            <p>$3.50</p>
          </div>
          <div class="card">
            <img src="images/mint_img.jpg" />
            <p>Choco</p>
            <p>$3.50</p>
          </div>
        </div>
      </section>
      <div class="content-button">
        <button id="view-products">View all products</button>
      </div>
    </main>

    <!-- Modal -->
    <!-- Modal section -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <span id="close-modal">&times;</span>
        <img id="modal-image" src="" alt="Cake" />
        <h2 id="modal-title"></h2>
        <p id="modal-price"></p>
        <p id="modal-description"></p>
        <button>Order Now</button>
      </div>
    </div>

    <!-- Newsletter Section -->

    <section class="newsletter">
      <h3>Join Our Sweet Newsletter</h3>
      <p>Be the first to hear about new cupcakes and special offers.</p>
      <form>
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Subscribe</button>
      </form>
    </section>

    <!-- footer -->
    <footer>
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="mailto:hello@munamicakery.com">Email Us</a>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
