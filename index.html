<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link

      rel="stylesheet"

    <title>Munami Cakery</title>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <a href="index.html">
        <h1>Munami Cakery</h1>
      </a>

      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <!-- Hero section -->
    <div class="hero">
      <div class="hero-heading">
        <h2>Everyday is a delicous adventure</h2>

        <img src="images/cupcake_img.webp" alt="Cupcake" />

      <section>
        <h2>Popular treats</h2>

          <div class="card">
            <img src="images/redVelvet_img.jpg" />

            <p>$3.50</p>
          </div>
          <div class="card">
            <img src="images/mint_img.jpg" />
            <p>Choco</p>
            <p>$3.50</p>
          </div>
        </div>
      </section>
      <div class="content-button">
        <button id="view-products">View all products</button>
      </div>
    </main>

    <!-- footer -->
    <footer>
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="mailto:hello@munamicakery.com">Email Us</a>
