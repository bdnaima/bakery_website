<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
  </head>
  <body>
    <main class="products-page">
      <h2>Cupcakes</h2>

      <section class="cards">
        <div class="card">
          <img src="images/cupcake1.jpg" alt="Chocolate Cupcake" />
          <p>Chocolate Dream</p>
          <p>$3.50</p>
        </div>

        <div class="card">
          <img src="images/cupcake2.jpg" alt="Vanilla Cupcake" />
          <p>Vanilla Bliss</p>
          <p>$3.50</p>
        </div>

        <!-- Repeat until 8 cupcakes -->
      </section>

      <h2>Wedding Cakes</h2>

      <section class="cards">
        <div class="card">
          <img src="images/cake1.jpg" alt="Wedding Cake" />
          <p>Classic Elegance</p>
          <p>$150</p>
        </div>

        <!-- Repeat until 8 cakes -->
      </section>
    </main>
  </body>
</html>
